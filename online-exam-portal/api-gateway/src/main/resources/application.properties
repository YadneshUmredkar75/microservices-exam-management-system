server.port=8080
spring.application.name=api-gateway

spring.main.web-application-type=reactive

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ─── CORS (handle it at gateway so all services are covered) ──────────────────
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].max-age=3600

# Prevent duplicate CORS headers (gateway + auth-service both set them → conflict)
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

# ─── Routes ───────────────────────────────────────────────────────────────────

# Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# User Service
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**

# Exam Service
spring.cloud.gateway.routes[2].id=exam-service
spring.cloud.gateway.routes[2].uri=lb://exam-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/exams/**

# Attempt Service
spring.cloud.gateway.routes[3].id=attempt-service
spring.cloud.gateway.routes[3].uri=lb://attempt-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/attempts/**

# Result Service
spring.cloud.gateway.routes[4].id=result-service
spring.cloud.gateway.routes[4].uri=lb://result-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/results/**

# Proctor Service
spring.cloud.gateway.routes[5].id=proctor-service
spring.cloud.gateway.routes[5].uri=lb://proctor-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/proctor/**

logging.level.org.springframework.cloud.gateway=DEBUG